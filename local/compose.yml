# Development Docker Compose configuration
#
# Works standalone (defaults for main branch) or with env vars (worktree mode).
# Environment variables (set via .env.local for worktrees):
#   COMPOSE_PROJECT_NAME - e.g., brock-feature-auth (default: brock)
#   DB_PORT              - Postgres port (mapped to container 5432)
#   S3_PORT              - SeaweedFS S3 port (mapped to container 8333)

services:
  db:
    image: paradedb/paradedb:0.23.4-pg18@sha256:52345be0965458c7b8e8e94657db5060aa8880dfaa10e3cc3c0c90115a7a309f
    container_name: ${COMPOSE_PROJECT_NAME:-brock}-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brock_dev
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  s3:
    image: docker.io/chrislusf/seaweedfs:4.17@sha256:186de7ef977a20343ee9a5544073f081976a29e2d29ecf8379891e7bf177fbe9
    container_name: ${COMPOSE_PROJECT_NAME:-brock}-s3
    command: server -s3
    ports:
      - "${S3_PORT:-4567}:8333"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 15

volumes:
  postgres_data:
  seaweedfs_data:
